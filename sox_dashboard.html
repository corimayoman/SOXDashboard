<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOX Controls Dashboard</title>
<style>
  /* Globant brand colors: #BFD732 lime, #00292E dark, #38EFA0 mint, #39B54A green,
     #63E3CF teal, #662D91 purple, #E61587 pink, #00A99D safety teal, #F7931E orange */
  :root {
    --g-lime:    #BFD732;
    --g-dark:    #00292E;
    --g-mint:    #38EFA0;
    --g-green:   #39B54A;
    --g-teal:    #63E3CF;
    --g-purple:  #662D91;
    --g-pink:    #E61587;
    --g-safety:  #00A99D;
    --g-orange:  #F7931E;
    --g-gray:    #666666;
    --g-light:   #F5F6F7;
    --bg:        #001a1e;
    --bg2:       #002228;
    --bg3:       #003038;
    --border:    #004a55;
    --text:      #e8f5f0;
    --muted:     #5a8a80;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--g-dark); border-bottom: 2px solid var(--g-lime); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.25rem; font-weight: 700; color: #fff; }
  header .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--g-lime); }
  header span { font-size: 0.75rem; color: var(--g-dark); background: var(--g-lime); padding: 2px 10px; border-radius: 12px; font-weight: 600; }
  .container { padding: 24px; max-width: 1700px; margin: 0 auto; }
  .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; border-top: 3px solid var(--border); }
  .card .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 6px; }
  .card .value { font-size: 1.8rem; font-weight: 700; }
  .card .sub { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
  .card.green  { border-top-color: var(--g-lime); }
  .card.green .value { color: var(--g-lime); }
  .card.red    { border-top-color: var(--g-pink); }
  .card.red .value { color: var(--g-pink); }
  .card.yellow { border-top-color: var(--g-orange); }
  .card.yellow .value { color: var(--g-orange); }
  .card.blue   { border-top-color: var(--g-teal); }
  .card.blue .value { color: var(--g-teal); }
  .card.purple { border-top-color: var(--g-purple); }
  .card.purple .value { color: #a855f7; }
  .filters { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; align-items: flex-end; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .filters select, .filters input { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 0.8rem; outline: none; min-width: 150px; }
  .filters select:focus, .filters input:focus { border-color: var(--g-lime); }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; font-size: 0.72rem; align-items: center; color: var(--muted); }
  .legend-item { display: flex; align-items: center; gap: 5px; color: var(--text); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  thead th { padding: 10px 12px; text-align: left; font-weight: 600; color: var(--g-lime); border-bottom: 1px solid var(--border); white-space: nowrap; position: sticky; top: 0; background: var(--bg2); z-index: 1; }
  thead th.month-col { text-align: center; font-size: 0.68rem; min-width: 82px; }
  tbody tr { border-bottom: 1px solid var(--bg3); transition: background 0.15s; }
  tbody tr:hover { background: var(--bg3); }
  tbody td { padding: 8px 12px; vertical-align: middle; }
  .ctrl-id { font-family: monospace; font-size: 0.7rem; color: var(--g-teal); white-space: nowrap; }
  .desc-cell { max-width: 200px; font-size: 0.74rem; color: #b0d0c8; line-height: 1.4; }
  .app-badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 0.65rem; font-weight: 600; background: var(--bg3); color: var(--g-teal); border: 1px solid var(--border); white-space: nowrap; }
  .tipo-badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 0.65rem; font-weight: 600; white-space: nowrap; }
  .tipo-ACC { background: #1a0a2e; color: #a78bfa; border: 1px solid var(--g-purple); }
  .tipo-CHG { background: #1f1000; color: var(--g-orange); border: 1px solid #7a4a00; }
  .tipo-OPE { background: #001a1a; color: var(--g-teal); border: 1px solid var(--g-safety); }
  .tipo-APD { background: #001a10; color: var(--g-mint); border: 1px solid var(--g-green); }
  .tipo-PAR { background: #1a0a1a; color: var(--g-pink); border: 1px solid #8a0050; }
  .status-cell { text-align: center; cursor: pointer; border-radius: 6px; padding: 5px 3px; font-size: 0.63rem; font-weight: 600; transition: all 0.15s; white-space: nowrap; }
  .status-cell:hover { opacity: 0.8; transform: scale(1.05); }
  .s-ejecutado { background: #0a2010; color: var(--g-lime); border: 1px solid var(--g-green); }
  .s-alerta    { background: #2a0020; color: var(--g-pink); border: 1px solid #8a0050; }
  .s-pendiente { background: #1f1000; color: var(--g-orange); border: 1px solid #7a4a00; }
  .s-tiempo    { background: #001a1a; color: var(--g-teal); border: 1px solid var(--g-safety); }
  .s-na        { background: #001418; color: var(--muted); border: 1px solid var(--border); cursor: default; }
  .freq-badge { font-size: 0.65rem; color: var(--muted); }
  .resp-cell { font-size: 0.72rem; color: #7ab0a8; max-width: 110px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,20,24,0.85); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-top: 3px solid var(--g-lime); border-radius: 12px; padding: 24px; max-width: 540px; width: 92%; max-height: 85vh; overflow-y: auto; }
  .modal-id { font-family: monospace; font-size: 0.85rem; color: var(--g-teal); margin-bottom: 4px; }
  .modal-title { font-size: 1rem; color: #fff; margin-bottom: 6px; line-height: 1.4; }
  .modal-month { font-size: 0.8rem; color: var(--g-lime); font-weight: 600; margin: 12px 0 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .modal-row { display: flex; gap: 10px; margin-bottom: 9px; font-size: 0.8rem; }
  .mkey { color: var(--muted); min-width: 140px; flex-shrink: 0; }
  .mval { color: var(--text); word-break: break-word; }
  .mval a { color: var(--g-teal); text-decoration: none; }
  .mval a:hover { text-decoration: underline; }
  .modal-close { margin-top: 18px; background: var(--g-lime); border: none; color: var(--g-dark); padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 700; }
  .modal-close:hover { background: var(--g-mint); }
  .no-results { text-align: center; padding: 40px; color: var(--muted); font-size: 0.85rem; }
  .chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px 24px; margin-bottom: 24px; }
  .chart-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 16px; }
  #trendChart { width: 100% !important; height: 200px !important; }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

  'GB.IT.ACC.AWS.02':    ['ejecutado','ejecutado','na','ejecutado','tiempo'],

const statusLabel = { ejecutado:'Ejecutado', alerta:'⚠ Alerta', pendiente:'Pendiente', tiempo:'A tiempo', na:'N/A' };
const tipoCode = (id, tipo) => tipo || (id.match(/GB\.IT\.(\w+)\./) || [])[1] || 'OPE';

let chartInstance = null;
function renderChart(data, yearFilter) {
  const visibleIdx = MONTHS.map((_,i) => i).filter(i => !yearFilter || MONTH_YEARS[i] === yearFilter);
  const labels   = visibleIdx.map(i => MONTH_LABELS[i]);
  const executed = visibleIdx.map(i => data.filter(c=>c.months[i]==='ejecutado').length);
  const failed   = visibleIdx.map(i => data.filter(c=>c.months[i]==='alerta'||c.months[i]==='pendiente').length);
  const notRun   = visibleIdx.map(i => data.filter(c=>c.months[i]==='na').length);

  const ctx = document.getElementById('trendChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Ejecutado',    data: executed, borderColor: '#BFD732', backgroundColor: 'rgba(191,215,50,0.1)',  tension: 0.4, pointBackgroundColor: '#BFD732', pointRadius: 5, fill: true },
        { label: 'Fallido',      data: failed,   borderColor: '#E61587', backgroundColor: 'rgba(230,21,135,0.1)', tension: 0.4, pointBackgroundColor: '#E61587', pointRadius: 5, fill: true },
        { label: 'No ejecutado', data: notRun,   borderColor: '#666666', backgroundColor: 'rgba(102,102,102,0.1)', tension: 0.4, pointBackgroundColor: '#666666', pointRadius: 5, fill: true },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#b0d0c8', font: { size: 11 }, boxWidth: 12 } },
        tooltip: { backgroundColor: '#002228', borderColor: '#004a55', borderWidth: 1, titleColor: '#BFD732', bodyColor: '#e8f5f0' }
      },
      scales: {
        x: { ticks: { color: '#5a8a80', font: { size: 11 } }, grid: { color: '#003038' } },
        y: { ticks: { color: '#5a8a80', font: { size: 11 }, stepSize: 1 }, grid: { color: '#003038' }, beginAtZero: true }
      }
    }
  });
}

function renderSummary(data, yearFilter) {
  const visibleIdx = MONTHS.map((_,i) => i).filter(i => !yearFilter || MONTH_YEARS[i] === yearFilter);
  const total = data.length;

  const cards = visibleIdx.map(i => {
    const exec    = data.filter(c=>c.months[i]==='ejecutado').length;
    const alert   = data.filter(c=>c.months[i]==='alerta'||c.months[i]==='pendiente').length;
    const onTime  = data.filter(c=>c.months[i]==='tiempo').length;
    const pct     = Math.round(exec/total*100);
    const isAlert = alert > 0;
    const isFuture= data.every(c=>c.months[i]==='tiempo'||c.months[i]==='na');
    if (isFuture) {
      return `<div class="card yellow"><div class="label">${MONTH_LABELS[i]}</div><div class="value">${onTime}</div><div class="sub">a tiempo</div></div>`;
    } else if (isAlert) {
      return `<div class="card red"><div class="label">Alertas ${MONTH_LABELS[i]}</div><div class="value">${alert}</div><div class="sub">vencidos</div></div>`;
    } else {
      return `<div class="card green"><div class="label">${MONTH_LABELS[i]}</div><div class="value">${pct}%</div><div class="sub">ejecutado</div></div>`;
    }
  }).join('');

  document.getElementById('summaryCards').innerHTML =
    `<div class="card blue"><div class="label">Total Controles</div><div class="value">${total}</div><div class="sub">en scope</div></div>` + cards;

  renderChart(data, yearFilter);
}

function cellClass(s) {
  return { ejecutado:'s-ejecutado', alerta:'s-alerta', pendiente:'s-pendiente', tiempo:'s-tiempo', na:'s-na' }[s] || 's-na';
}

function renderTable(data, yearFilter) {
  const tbody = document.getElementById('tableBody');
  const visibleIdx = MONTHS.map((_,i) => i).filter(i => !yearFilter || MONTH_YEARS[i] === yearFilter);

  // Update month headers
  document.querySelectorAll('thead th.month-col').forEach((th, i) => {
    th.style.display = visibleIdx.includes(i) ? '' : 'none';
  });

  if (!data.length) { tbody.innerHTML = `<tr><td colspan="11" class="no-results">No se encontraron controles con los filtros aplicados.</td></tr>`; return; }
  tbody.innerHTML = data.map(c => {
    const tipo = tipoCode(c.id, c.tipo);
    const months = MONTHS.map((m,i) => {
      const s = c.months[i];
      const cell = `<td style="display:${visibleIdx.includes(i)?'':'none'}"><div class="status-cell ${cellClass(s)}" onclick="showModal('${c.id}','${m}','${i}')">${statusLabel[s]||'N/A'}</div></td>`;
      return cell;
    }).join('');
    return `<tr>
      <td><span class="ctrl-id">${c.id}</span></td>
      <td><div class="desc-cell">${c.desc}</div></td>
      <td><span class="app-badge">${c.app}</span></td>
      <td><span class="tipo-badge tipo-${tipo}">${tipo}</span></td>
      <td><span class="freq-badge">${c.freq}</span></td>
      <td><div class="resp-cell">${c.resp}</div></td>
      ${months}
    </tr>`;
  }).join('');
}

function showModal(id, month, mIdx) {
  const ctrl = controls.find(c => c.id === id);
  if (!ctrl) return;
  const s = (monthlyData[id] || [])[mIdx] || 'na';
  const d = (details[id] && details[id][month]) || {};
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalContent').innerHTML = `
    <div class="modal-id">${ctrl.id}</div>
    <div class="modal-title">${ctrl.desc}</div>
    <div class="modal-month">${MONTH_LABELS[mIdx]} — <span class="${cellClass(s)}" style="padding:2px 8px;border-radius:6px;">${statusLabel[s]}</span></div>
    <div class="modal-row"><span class="mkey">Aplicación</span><span class="mval">${ctrl.app}</span></div>
    <div class="modal-row"><span class="mkey">Tipo de Control</span><span class="mval">${tipoCode(ctrl.id, ctrl.tipo)}</span></div>
    <div class="modal-row"><span class="mkey">Frecuencia</span><span class="mval">${ctrl.freq}</span></div>
    <div class="modal-row"><span class="mkey">Responsable</span><span class="mval">${ctrl.resp}</span></div>
    ${d.fecha_vcto ? `<div class="modal-row"><span class="mkey">Fecha Vencimiento</span><span class="mval">${d.fecha_vcto}</span></div>` : ''}
    ${d.fecha_ejec ? `<div class="modal-row"><span class="mkey">Fecha Ejecución</span><span class="mval">${d.fecha_ejec}</span></div>` : ''}
    ${d.evidencia  ? `<div class="modal-row"><span class="mkey">Evidencia</span><span class="mval"><a href="${d.evidencia}" target="_blank">Ver evidencia →</a></span></div>` : ''}
    ${d.obs        ? `<div class="modal-row"><span class="mkey">Observaciones</span><span class="mval">${d.obs}</span></div>` : ''}
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">Cerrar</button>
  `;
  overlay.classList.add('open');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

function populateFilters(data) {
  const apps  = [...new Set(data.map(c=>c.app))].sort();
  const tipos = [...new Set(data.map(c=>tipoCode(c.id, c.tipo)))].sort();
  const freqs = [...new Set(data.map(c=>c.freq))].sort();
  const appSel  = document.getElementById('filterApp');
  const tipoSel = document.getElementById('filterTipo');
  const freqSel = document.getElementById('filterFreq');
  apps.forEach(a  => { const o=document.createElement('option'); o.value=a; o.textContent=a; appSel.appendChild(o); });
  tipos.forEach(t => { const o=document.createElement('option'); o.value=t; o.textContent=t; tipoSel.appendChild(o); });
  freqs.forEach(f => { const o=document.createElement('option'); o.value=f; o.textContent=f; freqSel.appendChild(o); });
}

function getFiltered() {
  const app   = document.getElementById('filterApp').value;
  const tipo  = document.getElementById('filterTipo').value;
  const freq  = document.getElementById('filterFreq').value;
  const search= document.getElementById('filterSearch').value.toLowerCase();
  return controls
    .map(c => ({ ...c, months: monthlyData[c.id] || ['na','na','na','na','na'] }))
    .filter(c =>
      (!app   || c.app === app) &&
      (!tipo  || tipoCode(c.id, c.tipo) === tipo) &&
      (!freq  || c.freq === freq) &&
      (!search|| c.id.toLowerCase().includes(search) || c.desc.toLowerCase().includes(search))
    );
}

function refresh() {
  const data = getFiltered();
  const yearFilter = document.getElementById('filterYear').value;
  renderSummary(data, yearFilter);
  renderTable(data, yearFilter);
}

['filterApp','filterTipo','filterFreq','filterYear'].forEach(id => document.getElementById(id).addEventListener('change', refresh));
document.getElementById('filterSearch').addEventListener('input', refresh);

const allData = controls.map(c => ({ ...c, months: monthlyData[c.id] || ['na','na','na','na','na'] }));
populateFilters(allData);
refresh();
</script>
</body>
</html>
